name: PIKKY CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  SOLANA_CLI_VERSION: 1.18.17
  ANCHOR_VERSION: 0.30.1
  NODE_VERSION: 20
  PYTHON_VERSION: "3.11"
  RUST_TOOLCHAIN: stable

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Rust: Lint, Test, Build
  # ─────────────────────────────────────────────
  rust-check:
    name: Rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            programs/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: programs
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: programs
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        working-directory: programs
        run: cargo test --all-features --verbose

      - name: Build release
        working-directory: programs
        run: cargo build --release

  # ─────────────────────────────────────────────
  # TypeScript: Lint, Test, Build
  # ─────────────────────────────────────────────
  typescript-check:
    name: TypeScript / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            sdk/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('sdk/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: sdk
        run: npm ci

      - name: Lint
        working-directory: sdk
        run: npm run lint

      - name: Type check
        working-directory: sdk
        run: npm run typecheck

      - name: Run tests
        working-directory: sdk
        run: npm test -- --coverage

      - name: Build
        working-directory: sdk
        run: npm run build

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ts-coverage
          path: sdk/coverage/

  # ─────────────────────────────────────────────
  # Python: Lint, Test
  # ─────────────────────────────────────────────
  python-check:
    name: Python / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            agent/.venv
          key: ${{ runner.os }}-pip-${{ hashFiles('agent/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        working-directory: agent
        run: ruff check .

      - name: Format check with ruff
        working-directory: agent
        run: ruff format --check .

      - name: Type check with mypy
        working-directory: agent
        run: mypy src/ --ignore-missing-imports

      - name: Run tests
        working-directory: agent
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: py-coverage
          path: agent/coverage.xml

  # ─────────────────────────────────────────────
  # Solana Program: Build + Test (Anchor)
  # ─────────────────────────────────────────────
  solana-program:
    name: Solana Program
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            programs/target/
          key: ${{ runner.os }}-solana-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-solana-cargo-

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_CLI_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}

      - name: Build program
        run: anchor build

      - name: Run Anchor tests
        run: anchor test

  # ─────────────────────────────────────────────
  # Integration Tests
  # ─────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-check, typescript-check, python-check]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python deps
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Node deps
        working-directory: sdk
        run: npm ci

      - name: Run integration tests
        env:
          SOLANA_RPC_URL: https://api.devnet.solana.com
          PIKKY_ENV: test
        run: pytest tests/integration/ -v --timeout=120

  # ─────────────────────────────────────────────
  # Security Audit
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        working-directory: programs
        run: cargo audit

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit npm dependencies
        working-directory: sdk
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Audit Python dependencies
        working-directory: agent
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
